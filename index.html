<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="番茄时钟">
  <meta name="theme-color" content="#ba4949">
  <meta name="description" content="番茄时钟 - 专注工作，高效休息">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍅</text></svg>">
  <title>番茄时钟</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body data-mode="pomodoro">

  <!-- Flash overlay for timer complete animation -->
  <div class="timer-flash" id="timerFlash"></div>

  <!-- Custom Title Bar (desktop only) -->
  <div class="titlebar" id="titlebar">
    <div class="titlebar-drag">
      <span class="titlebar-title">🍅 番茄时钟</span>
    </div>
    <div class="titlebar-controls">
      <button class="titlebar-btn pin-btn" id="pinBtn" title="常驻顶部">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="17" x2="12" y2="22"/>
          <path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/>
        </svg>
      </button>
      <button class="titlebar-btn" id="settingsBtn" title="设置">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>
      <button class="titlebar-btn" id="minimizeBtn" title="最小化">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
      <button class="titlebar-btn close-btn" id="closeBtn" title="关闭">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <!-- Timer Container -->
    <div class="timer-container">
      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="pomodoro">专注</button>
        <button class="mode-tab" data-mode="shortBreak">短休息</button>
        <button class="mode-tab" data-mode="longBreak">长休息</button>
      </div>

      <!-- Scrollable Time Picker (shown when not running) -->
      <div class="time-picker" id="timePicker">
        <div class="picker-hint-up">▲</div>
        <div class="picker-wrapper">
          <div class="picker-value" id="pickerValue">25</div>
          <div class="picker-unit">分钟</div>
        </div>
        <div class="picker-hint-down">▼</div>
      </div>

      <!-- Countdown Display (shown when running) -->
      <div class="timer-display" id="timerDisplay" style="display: none;">25:00</div>

      <button class="timer-action-btn" id="timerActionBtn">开始</button>
    </div>

    <!-- Pomodoro Counter -->
    <div class="pomo-counter">
      <span class="pomo-number" id="pomoNumber">#1</span>
      <span class="pomo-message" id="pomoMessage">准备开始专注！</span>
    </div>

    <!-- Tasks Section -->
    <div class="tasks-section">
      <div class="tasks-header">
        <h2>任务列表</h2>
        <button class="tasks-menu-btn" id="tasksMenuBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <circle cx="12" cy="5" r="2"/>
            <circle cx="12" cy="12" r="2"/>
            <circle cx="12" cy="19" r="2"/>
          </svg>
        </button>
        <div class="tasks-dropdown" id="tasksDropdown">
          <button class="dropdown-item" id="clearFinishedBtn">清除已完成</button>
          <button class="dropdown-item" id="clearAllBtn">清除全部</button>
        </div>
      </div>
      <div class="tasks-divider"></div>

      <!-- Task List -->
      <div class="task-list" id="taskList"></div>

      <!-- Add Task Button / Form -->
      <div id="addTaskArea">
        <button class="add-task-btn" id="addTaskBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="16"/>
            <line x1="8" y1="12" x2="16" y2="12"/>
          </svg>
          添加任务
        </button>

        <div class="add-task-form" id="addTaskForm" style="display: none;">
          <input type="text" class="task-input" id="taskInput" placeholder="你在做什么？" autofocus>
          <div class="est-pomos">
            <span class="est-label">预估番茄数</span>
            <div class="est-controls">
              <button class="est-btn" id="estMinus">−</button>
              <span class="est-value" id="estValue">1</span>
              <button class="est-btn" id="estPlus">+</button>
            </div>
          </div>
          <div class="form-actions">
            <button class="cancel-btn" id="cancelTaskBtn">取消</button>
            <button class="save-btn" id="saveTaskBtn">保存</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsModal" style="display: none;">
    <div class="modal">
      <div class="modal-header">
        <h2>设置</h2>
        <button class="modal-close" id="closeSettingsBtn">✕</button>
      </div>
      <div class="modal-body">
        <div class="setting-group">
          <h3>🔄 自动化</h3>
          <div class="setting-row">
            <span>自动开始休息</span>
            <label class="toggle">
              <input type="checkbox" id="settingAutoBreak">
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="setting-row">
            <span>自动开始专注</span>
            <label class="toggle">
              <input type="checkbox" id="settingAutoPomodoro">
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>

        <div class="setting-group">
          <h3>🔔 长休息间隔</h3>
          <div class="setting-row">
            <span>每隔几个番茄后长休息</span>
            <input type="number" class="small-input" id="settingLongBreakInterval" min="2" max="10" value="4">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="save-settings-btn" id="saveSettingsBtn">保存设置</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    // Register service worker for PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
